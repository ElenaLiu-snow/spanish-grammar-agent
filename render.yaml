services:
  - type: web
    name: spanish-grammar-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: FRONTEND_ORIGINS
        value: https://spanish-grammar-agent.vercel.app,http://localhost:3000,http://localhost:3001
      - key: BACKEND_PORT
        value: "8001"
